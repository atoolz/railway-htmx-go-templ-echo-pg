<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="640" cy="280" rx="500" ry="250" fill="#00c9a7" opacity="0.05" filter="url(#blur1)"/>
  <ellipse cx="400" cy="300" rx="200" ry="150" fill="#0891b2" opacity="0.04" filter="url(#blur1)"/>
  <ellipse cx="880" cy="260" rx="200" ry="150" fill="#6366f1" opacity="0.03" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#00c9a7" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative Go code fragments - left side -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" opacity="0.12">
    <text x="50" y="120" fill="#00c9a7">func</text>
    <text x="95" y="120" fill="#d4d4d4"> HomeHandler(</text>
    <text x="210" y="120" fill="#0891b2">c echo.Context</text>
    <text x="335" y="120" fill="#d4d4d4">) {</text>

    <text x="70" y="160" fill="#d4d4d4">return </text>
    <text x="125" y="160" fill="#00c9a7">Render</text>
    <text x="175" y="160" fill="#d4d4d4">(c, </text>
    <text x="200" y="160" fill="#0891b2">templates.Home</text>
    <text x="330" y="160" fill="#d4d4d4">(todos))</text>

    <text x="40" y="480" fill="#569cd6">&lt;div</text>
    <text x="82" y="480" fill="#9cdcfe"> hx-get</text>
    <text x="135" y="480" fill="#d4d4d4">=</text>
    <text x="143" y="480" fill="#ce9178">"/todos"</text>
    <text x="205" y="480" fill="#569cd6">&gt;</text>

    <text x="60" y="520" fill="#569cd6">&lt;form</text>
    <text x="108" y="520" fill="#9cdcfe"> hx-post</text>
    <text x="173" y="520" fill="#d4d4d4">=</text>
    <text x="181" y="520" fill="#ce9178">"/todos"</text>
    <text x="243" y="520" fill="#9cdcfe"> hx-swap</text>
    <text x="305" y="520" fill="#d4d4d4">=</text>
    <text x="313" y="520" fill="#ce9178">"afterbegin"</text>
    <text x="397" y="520" fill="#569cd6">&gt;</text>
  </g>

  <!-- Decorative code fragments - right side -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" opacity="0.12">
    <text x="900" y="130" fill="#00c9a7">templ</text>
    <text x="945" y="130" fill="#d4d4d4"> TodoItem(</text>
    <text x="1035" y="130" fill="#0891b2">todo Todo</text>
    <text x="1120" y="130" fill="#d4d4d4">) {</text>

    <text x="920" y="170" fill="#569cd6">&lt;div</text>
    <text x="960" y="170" fill="#9cdcfe"> hx-delete</text>
    <text x="1050" y="170" fill="#d4d4d4">=</text>
    <text x="1058" y="170" fill="#ce9178">{ url }</text>
    <text x="1100" y="170" fill="#569cd6">&gt;</text>

    <text x="910" y="470" fill="#00c9a7">pool</text>
    <text x="945" y="470" fill="#d4d4d4">.QueryRow(ctx,</text>
    <text x="920" y="500" fill="#ce9178">"SELECT * FROM todos"</text>
    <text x="1120" y="500" fill="#d4d4d4">)</text>
  </g>

  <!-- Decorative symbols -->
  <text x="180" y="340" font-family="'Cascadia Code', monospace" font-size="70" fill="#00c9a7" opacity="0.05">&lt;/&gt;</text>
  <text x="920" y="360" font-family="'Cascadia Code', monospace" font-size="70" fill="#0891b2" opacity="0.05">func</text>

  <!-- Tech stack icons row -->
  <g transform="translate(370, 140)">
    <!-- HTMX badge -->
    <rect x="0" y="0" width="64" height="64" rx="14" fill="#3366CC" opacity="0.15" stroke="#3366CC" stroke-width="1" stroke-opacity="0.3"/>
    <text x="32" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="22" font-weight="700" fill="#58a6ff">Hx</text>
    <!-- + -->
    <text x="96" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="24" fill="#484f58">+</text>
    <!-- Go badge -->
    <rect x="128" y="0" width="64" height="64" rx="14" fill="#00ADD8" opacity="0.15" stroke="#00ADD8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="160" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="22" font-weight="700" fill="#00ADD8">Go</text>
    <!-- + -->
    <text x="224" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="24" fill="#484f58">+</text>
    <!-- Echo badge -->
    <rect x="256" y="0" width="64" height="64" rx="14" fill="#00c9a7" opacity="0.15" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="288" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#00c9a7">Ec</text>
    <!-- + -->
    <text x="352" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="24" fill="#484f58">+</text>
    <!-- PG badge -->
    <rect x="384" y="0" width="64" height="64" rx="14" fill="#336791" opacity="0.15" stroke="#336791" stroke-width="1" stroke-opacity="0.3"/>
    <text x="416" y="37" text-anchor="middle" dominant-baseline="central" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#6d9ece">PG</text>
  </g>

  <!-- Main title -->
  <text x="640" y="295" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">
    HTMX + Go + Echo
  </text>

  <!-- Accent line -->
  <rect x="420" y="315" width="440" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="640" y="370" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="300" fill="#8b949e" letter-spacing="4">
    Railway Starter Template
  </text>

  <!-- Tagline -->
  <text x="640" y="420" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" fill="#00c9a7" letter-spacing="1">
    Templ . Echo . PostgreSQL . Tailwind CSS . One-Click Deploy
  </text>

  <!-- Deploy badge -->
  <g transform="translate(540, 455)">
    <rect width="200" height="38" rx="19" fill="#00c9a7" opacity="0.12" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="100" y="24" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#00c9a7" letter-spacing="0.5">Deploy on Railway</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent2)"/>
</svg>
